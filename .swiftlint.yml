included:
  - App/Sources
  - Core
  - Features

excluded:
  - "**/Derived/**"
  - "**/.build/**"
  - "**/Tests/**/Mocks/**"

opt_in_rules:
  - empty_count
  - explicit_init
  - first_where
  - force_unwrapping
  - implicit_return
  - last_where
  - literal_expression_end_indentation
  - missing_docs
  - operator_usage_whitespace
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - sorted_imports
  - toggle_bool
  - unused_import
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces

disabled_rules:
  - todo                       # we allow tagged TODOs
  - identifier_name            # too noisy for short Swift idioms

line_length:
  warning: 140
  error: 200

type_body_length:
  warning: 350

file_length:
  warning: 500
  error: 800

function_body_length:
  warning: 60

cyclomatic_complexity:
  warning: 12

force_cast: error
force_try: error
force_unwrapping:
  severity: error

reporter: "xcode"
